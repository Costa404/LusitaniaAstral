<!doctype html>
<html lang="pt-PT">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Lusitânia Astral - Interface de Descoberta</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="css/styles.css" />
  </head>
  <body class="text-slate-300 min-h-screen">
    <nav
      class="bg-black/80 backdrop-blur-md p-4 border-b border-cyan-900 flex flex-wrap justify-between items-center sticky top-0 z-50"
    >
      <div class="flex items-center gap-3">
        <div
          class="w-8 h-8 rounded-full border-2 border-cyan-400 border-t-transparent animate-spin"
        ></div>
        <div
          class="text-2xl font-bold text-cyan-400 tracking-[0.2em] uppercase"
        >
          Lusitânia<span class="text-white">Astral</span>
        </div>
      </div>
      <div class="flex gap-4 items-center mt-4 sm:mt-0 font-tech">
        <button
          id="btn-moeda"
          onclick="alternarMoeda()"
          class="text-sm bg-transparent border border-cyan-500 hover:bg-cyan-900/50 text-cyan-400 px-4 py-2 uppercase tracking-wide transition-all neon-border"
        >
          [ Mostrar EUR ]
        </button>
        <div
          class="text-sm text-fuchsia-400 border border-fuchsia-900 bg-fuchsia-950/30 px-3 py-2 uppercase"
        >
          Fav_Sync:
          <span id="contador-favoritos" class="text-white font-bold">0</span>
        </div>
      </div>
    </nav>

    <header class="text-center py-16 px-4 relative overflow-hidden">
      <div
        class="absolute inset-0 bg-[url('https://images.unsplash.com/photo-1506318137071-a8e063b4bec0?auto=format&fit=crop&w=1920&q=80')] bg-cover bg-center opacity-20 mix-blend-screen"
      ></div>
      <div class="relative z-10">
        <h1
          class="text-5xl md:text-6xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-cyan-400 to-fuchsia-500 uppercase tracking-widest mb-4"
        >
          Rede de Expansão
        </h1>
        <p class="text-xl text-cyan-200 font-tech tracking-wider">
          Acesso autorizado ao terminal de Dobras de Camões.
        </p>
      </div>
    </header>

    <main class="container mx-auto px-4 py-8">
      <section
        class="mb-10 flex flex-col md:flex-row gap-4 items-center justify-between bg-black/60 border border-cyan-900 p-4 neon-border"
      >
        <div class="flex items-center gap-2">
          <span class="w-2 h-2 bg-cyan-400 rounded-full animate-pulse"></span>
          <h2 class="text-lg font-bold text-cyan-400 uppercase tracking-widest">
            Análise de Habitabilidade
          </h2>
        </div>
        <select
          id="filtro-recurso"
          onchange="filtrarPlanetas()"
          class="bg-gray-900 text-cyan-300 font-tech border border-cyan-800 p-2 outline-none focus:border-cyan-400 uppercase min-w-[250px] appearance-none cursor-pointer"
        >
          <option value="todos">-- MATRIZ COMPLETA --</option>
          <optgroup label="Fauna" class="bg-black">
            <option value="marisco">Marisco</option>
            <option value="terrestre">Terrestre</option>
          </optgroup>
          <optgroup label="Flora" class="bg-black">
            <option value="madeireira">Madeireira</option>
            <option value="ornamental">Ornamental</option>
          </optgroup>
          <optgroup label="Geologia" class="bg-black">
            <option value="minerio">Minério</option>
            <option value="gas">Gás</option>
          </optgroup>
        </select>
      </section>

      <section
        id="grelha-planetas"
        class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-8"
      ></section>
    </main>

    <script src="js/script.js"></script>
  </body>
</html>
